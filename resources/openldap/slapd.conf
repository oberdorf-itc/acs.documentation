# OpenLDAP Server configuration file slapd.conf
############################################################
# general configuration

# Schema extension
include /etc/ldap/schema/core.schema
include /etc/ldap/schema/cosine.schema
include /etc/ldap/schema/inetorgperson.schema
include /etc/ldap/schema/nis.schema
include /etc/ldap/schema/oitc-desfire.schema
include /etc/ldap/schema/oitc-acs.schema


# server process configuration
pidfile  /var/run/slapd/slapd.pid
argsfile /var/run/slapd/slapd.args


# Logging
#     1      trace function calls
#     2      debug packet handling
#     4      heavy trace debugging
#     8      connection management
#     16     print out packets sent and received
#     32     search filter processing
#     64     configuration file processing
#     128    access control list processing stats
#     256    log connections/operations/results
#     512    stats log entries sent
#     1024   print communication with shell backends
#     2048   entry parsing

loglevel 256
#logLevel 4095

# Load dynamic backend modules:
modulepath /usr/lib/openldap
moduleload back_mdb.so

password-hash {SSHA}


# SSL configuration
TLSCACertificateFile /etc/ldap/certs/cacert.pem
TLSCertificateFile /etc/ldap/certs/servercert.pem
TLSCertificateKeyFile /etc/ldap/certs/serverkey.pem


############################################################
# Access control lists

access to dn.base="" by * read
access to dn.subtree="cn=Subschema" by * read
access to dn.subtree="cn=monitor" by * read
#access to dn.subtree="cn=config"
#        by group/groupofuniquenames/uniquemember="cn=Directory Administrators,ou=Groups,dc=oberdorf-itc,dc=de" write
#        by * none
access to attrs=userPassword,shadowLastChange,oitcRFIDpICCLevelMasterKey,oitcRFIDApplicationKey01,oitcRFIDApplicationKey02,oitcRFIDApplicationKey03,oitcRFIDApplicationKey04,oitcRFIDApplicationKey05,oitcRFIDApplicationKey06,oitcRFIDApplicationKey07,oitcRFIDApplicationKey08,oitcRFIDApplicationKey09,oitcRFIDApplicationKey10,oitcRFIDApplicationKey11,oitcRFIDApplicationKey12,oitcRFIDApplicationKey13,oitcRFIDApplicationKey14
        by group/groupofuniquenames/uniquemember="cn=Directory Administrators,ou=Groups,dc=oberdorf-itc,dc=de" write
        by self write
        by anonymous auth
        by * none
access to attrs=oitcACSTransponderRandomSecret,oitcACSReaderAuthenticationKey
        by group/groupofuniquenames/uniquemember="cn=Directory Administrators,ou=Groups,dc=oberdorf-itc,dc=de" write
        by dn="uid=Card Management System,ou=Technical Accounts,dc=oberdorf-itc,dc=de" write
        by dn="uid=Access Control Server,ou=Technical Accounts,dc=oberdorf-itc,dc=de" read
        by self write
        by anonymous auth
        by * none
access to dn.exact="ou=Users,dc=oberdorf-itc,dc=de"
        by group/groupofuniquenames/uniquemember="cn=Directory Administrators,ou=Groups,dc=oberdorf-itc,dc=de" write
        by dn="uid=ACS Manager,ou=Technical Accounts,dc=oberdorf-itc,dc=de" write
        by users read
access to dn.children="ou=Users,dc=oberdorf-itc,dc=de"
        by group/groupofuniquenames/uniquemember="cn=Directory Administrators,ou=Groups,dc=oberdorf-itc,dc=de" write
        by dn="uid=ACS Manager,ou=Technical Accounts,dc=oberdorf-itc,dc=de" write
        by dn="uid=Keycloak,ou=Technical Accounts,dc=oberdorf-itc,dc=de" write
        by self write
        by users read
        by anonymous auth
access to dn.children="ou=Technical Users,dc=oberdorf-itc,dc=de"
        by group/groupofuniquenames/uniquemember="cn=Directory Administrators,ou=Groups,dc=oberdorf-itc,dc=de" write
        by users read
        by anonymous auth
access to dn.subtree="ou=OITC Access Control System,dc=oberdorf-itc,dc=de"
        by group/groupofuniquenames/uniquemember="cn=Directory Administrators,ou=Groups,dc=oberdorf-itc,dc=de" write
        by group/groupofuniquenames/uniquemember="cn=OITC ACS Administrators,ou=Groups,dc=oberdorf-itc,dc=de" write
        by dn="uid=Card Management System,ou=Technical Accounts,dc=oberdorf-itc,dc=de" write
        by dn="uid=Access Control Server,ou=Technical Accounts,dc=oberdorf-itc,dc=de" read
        by dn="uid=ACS Manager,ou=Technical Accounts,dc=oberdorf-itc,dc=de" write
        by dn="uid=ACS Relay Control Service,ou=Technical Accounts,dc=oberdorf-itc,dc=de" read
        by * none
access to *
        by group/groupofuniquenames/uniquemember="cn=Directory Administrators,ou=Groups,dc=oberdorf-itc,dc=de" write
        by users read
        by anonymous auth

############################################################
# Database configuration

#-----------------------------------------------------------
# users database 1
database  mdb
suffix    "dc=oberdorf-itc,dc=de"
rootdn    "uid=Directory Manager,ou=Technical Accounts,dc=oberdorf-itc,dc=de"
rootpw    {ssha}myEncryptedPassword
directory /var/lib/ldap/slapd-001

index     objectClass              pres,eq
index     uid                      pres,eq
index     cn,sn                    pres,eq,sub

# Index for schema oitc-desfire.schema
index     oitcTransponderID        pres,eq
index     oitcRFIDApplicationID    pres,eq
index     oitcRFIDFileID           pres,eq
index     oitcACSNotifyId          pres,eq
index     ipHostNumber             pres,eq

#-----------------------------------------------------------
# Backend Monitoring Database (needs to be the last database entry)
database monitor
